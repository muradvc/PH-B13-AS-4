<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!-- taiwind css connect -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- font awosome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  <!-- css -->
   <link rel="stylesheet" href="./style.css">

  <style>
    body {
      font-family: "Geist", sans-serif;
      background-color: #F8FAFC;
    }
  </style>
  <body>
    <header class=" w-[80%] mx-auto">
      <h1 class="font-bold text-[#002C5C] text-[32px] pt-14 mb-5">Job Application Tracker</h1>
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-[30px]">
        <div class="bg-white p-5 rounded-lg">
          <p class="mb-2">Total</p>
          <p id="total-count" class="font-bold text-[24px]">0</p>
        </div>
        <div class="bg-white p-5 rounded-lg">
          <p class="mb-2">Interview</p>
          <p id="interview-count" class="font-bold text-[24px] text-[#10B981]">0</p>
        </div>
        <div class="bg-white p-5 rounded-lg">
          <p class="mb-2">Rejected</p>
          <p id="rejected-count" class="font-bold text-[24px] text-[#EF4444]">0</p>
        </div>
      </div>
    </header>
    <hr class="border-[#E6E7E9] w-[80%] mx-auto">
    <main class="mt-8 w-[80%] mx-auto">
      <div class="available-jobs flex justify-between mb-6">
        <h3 class="text-[#002C5C] font-semibold text-[20px]">Available Jobs</h3>
        <div></div>
        <p class="text-[#64748B] font-medium"><span id="count-jobs">0</span> jobs</p>
      </div>
  
      <div class=" grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
        <button onclick="toggleStyle('all-filter-btn')" id="all-filter-btn"
          class="py-2.5 px-8 bg-[#3B82F6] text-[12px] text-white rounded-sm font-medium">All</button>
        <button onclick="toggleStyle('interview-filter-btn')" id="interview-filter-btn"
          class="py-2.5 px-8 bg-white text-[12px] text-[#64748B] rounded-sm font-medium">Interview</button>
        <button onclick="toggleStyle('rejected-filter-btn')" id="rejected-filter-btn"
          class="py-2.5 px-8 bg-white text-[12px] text-[#64748B] rounded-sm font-medium">Rejected</button>
      </div>
  
      <!-- filter cards -->
      <section id="filtered-section" class="hidden">
  
      </section>
  
      
  
  
    </main>
  
  
    <script src="./javaScript.js"></script>
  </body>
</head>



</html>
